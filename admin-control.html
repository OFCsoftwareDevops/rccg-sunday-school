<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Church Approval Admin</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: auto; }
    button { margin: 8px 4px; padding: 10px 16px; font-size: 16px; cursor: pointer; }
    pre { background: #f4f4f4; padding: 12px; overflow: auto; border-radius: 6px; white-space: pre-wrap; }
    input { padding: 10px; margin: 8px 0; width: 100%; box-sizing: border-box; }
    #authStatus { color: green; font-weight: bold; }
    #googleSignInBtn { background: #4285F4; color: white; border: none; }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <h1>Church Requests Admin</h1>

  <h3>Sign In</h3>
  <button id="googleSignInBtn" onclick="signInWithGoogle()">
      Sign in with Google
  </button>
  <button onclick="signOut()">Sign Out</button>
  
  <p id="authStatus">Not signed in</p>
  <hr>

  <button onclick="listPending()">1. List Pending Requests</button>

  <h3>Single Request</h3>
  <input type="text" id="reqId" placeholder="Enter Request ID">
  <button onclick="approve()">Approve</button>
  <button onclick="reject()">Reject</button>

  <h3>Batch Actions</h3>
  <button onclick="batchApprove()">Batch Approve All Pending</button>
  <button onclick="batchReject()">Batch Reject All Pending</button>

  <h3>Maintenance</h3>
  <button onclick="cleanup()">Cleanup Processed (>7 days)</button>
  <button onclick="backfill()">Backfill Used Codes</button>

  <pre id="output">Results appear here... Sign in first.</pre>

  <script type="module">
    import firebaseConfig from './config.js';

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithRedirect,
      getRedirectResult,
      onAuthStateChanged,
      signOut as firebaseSignOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    let idToken = null;
    let loginInProgress = false;
    
    // ====================== AUTH STATE ======================
    onAuthStateChanged(auth, async (user) => {
      // 🔄 ALWAYS reset UI lock
      loginInProgress = false;
      
      const btn = document.getElementById("googleSignInBtn");
      if (btn) btn.disabled = false;
      
      console.log('Auth state changed:', user ? user.email : 'No user');
    
      if (user) {
        idToken = await user.getIdToken();
        document.getElementById('authStatus').innerHTML = 
          `<span class="success">✅ Signed in as ${user.email}</span>`;
        document.getElementById('output').textContent = 'Ready! You can now manage requests.';
      } else {
        idToken = null;
        document.getElementById('authStatus').innerHTML = 
          `<span class="error">Not signed in</span>`;
        document.getElementById('output').textContent = 'Please sign in first.';
      }
    });
    
    // ====================== REDIRECT RESULT ======================
    getRedirectResult(auth)
      .then((result) => {
        if (result?.user) {
          console.log('Redirect login successful:', result.user.email);
        }
      })
      .catch((error) => {
        console.error("Redirect Result Error:", error.code, error.message);
        if (error.code !== "auth/cancelled-popup-request" && 
            error.code !== "auth/redirect-cancelled-by-user") {
          document.getElementById('output').textContent = 
            `Redirect Error: ${error.message}`;
        }
      });
    
    // ====================== SIGN IN ======================
    window.signInWithGoogle = function () {
      if (loginInProgress) return;
      loginInProgress = true;
      
      // 🔒 disable button immediately
      const btn = document.getElementById("googleSignInBtn");
      if (btn) btn.disabled = true;
    
      const provider = new GoogleAuthProvider();
      provider.setCustomParameters({
        prompt: 'select_account'   // Helps avoid some redirect issues
      });

      console.log("Starting Google Redirect Sign-in...");

      signInWithRedirect(auth, provider).catch((error) => {
        console.error("Sign-in error:", error.code, error.message);
        loginInProgress = false;
        if (btn) btn.disabled = false;

        let msg = error.message;
        if (error.code === "auth/unauthorized-domain") {
          msg = "Error: This domain is not authorized. Add it in Firebase Console.";
        } else if (error.code === "auth/popup-closed-by-user") {
          msg = "Sign-in was cancelled.";
        }
        document.getElementById('output').textContent = `Sign-in failed: ${msg}`;
      });
    };

    // ====================== SIGN OUT ======================
    window.signOut = async function () {
      try {
        await firebaseSignOut(auth);
        document.getElementById('output').textContent = "Signed out successfully.";
      } catch (err) {
        console.error(err);
      }
    };
    
    // ====================== CALL CLOUD FUNCTIONS ======================
    window.callFunction = async function (endpoint, method = 'GET', body = null) {
      if (!idToken) {
        alert('Please sign in first');
        return;
      }

      const url = `https://us-central1-sundayschoolmanual-e2951.cloudfunctions.net/${endpoint}`;

      const options = {
        method,
        headers: {
          'Authorization': `Bearer ${idToken}`,
          'Content-Type': 'application/json'
        }
      };

      if (body) options.body = JSON.stringify(body);

      try {
        const res = await fetch(url, options);
        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          data = text;
        }

        if (!res.ok) {
          throw new Error(data.error || data.message || `HTTP ${res.status}`);
        }

        document.getElementById('output').textContent = 
          JSON.stringify(data, null, 2);
      } catch (err) {
        console.error(err);
        document.getElementById('output').textContent = 
          `Error: ${err.message}`;
      }
    };
    
    // Button functions
    window.listPending = () => callFunction('listPending');
    window.approve = () => callFunction('approve', 'POST', { id: document.getElementById('reqId').value });
    window.reject = () => callFunction('reject', 'POST', { id: document.getElementById('reqId').value });
    window.batchApprove = () => callFunction('batchApprove', 'POST');
    window.batchReject = () => callFunction('batchReject', 'POST');
    window.cleanup = () => callFunction('cleanup', 'POST');
    window.backfill = () => callFunction('backfill', 'POST');
  </script>
</body>
</html>
