<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Request Account & Data Deletion</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
      text-align: center;
    }
    h1 { font-size: 1.8rem; margin-bottom: 1rem; }
    p { margin-bottom: 1.5rem; }
    button {
      padding: 12px 32px;
      font-size: 1.1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin: 0.5rem;
    }
    #googleSignIn { background: #4285f4; color: white; }
    #googleSignIn:hover { background: #3367d6; }
    #requestDeletion { background: #db4437; color: white; display: none; }
    #requestDeletion:hover { background: #c1351f; }
    #signOut { background: #f1f3f4; color: #202124; display: none; font-size: 0.9rem; }
    #message { margin-top: 1.5rem; padding: 12px; border-radius: 6px; min-height: 60px; }
    .success { background: #e8f5e9; color: #2e7d32; }
    .error   { background: #ffebee; color: #c62828; }
    #userInfo { font-weight: bold; margin: 1rem 0; }
  </style>

  <!-- Firebase SDK v10+ (modular, latest as of 2026) -->
  <script type="module">
    import firebaseConfig from './config.js';

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-functions.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const functions = getFunctions(app, "us-central1"); // match your region

    const provider = new GoogleAuthProvider();
    const requestDeletionFn = httpsCallable(functions, "requestAccountDeletion");

    let currentUser = null;

    // Listen for auth changes
    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      updateUI();
    });

    function updateUI() {
      document.getElementById("googleSignIn").style.display = currentUser ? "none" : "inline-block";
      document.getElementById("requestDeletion").style.display = currentUser ? "inline-block" : "none";
      document.getElementById("signOut").style.display = currentUser ? "inline-block" : "none";
      
      document.getElementById("userInfo").textContent = currentUser 
        ? `Logged in as: ${currentUser.displayName || currentUser.email}` 
        : "";
    }

    function showMessage(text, type = "") {
      const el = document.getElementById("message");
      el.textContent = text;
      el.className = type;
    }

    // ====================== SIGN IN ======================
    document.getElementById("googleSignIn").addEventListener("click", async () => {
      try {
        showMessage("Connecting to Google...", "");
        
        provider.setCustomParameters({ prompt: 'select_account' });
        
        const result = await signInWithPopup(auth, provider);
        showMessage(`Welcome, ${result.user.displayName || result.user.email}!`, "success");
      } catch (error) {
        console.error("Sign-in error:", error);
        
        if (error.code === "auth/popup-closed-by-user" || error.code === "auth/cancelled-popup-request") {
          showMessage("Sign-in was cancelled. Please try again.", "error");
        } else if (error.code === "auth/unauthorized-domain") {
          showMessage("Error: This domain is not authorized in Firebase Console.", "error");
        } else {
          showMessage(error.message || "Sign-in failed. Please try again.", "error");
        }
      }
    });

    // ====================== REQUEST DELETION ======================
    document.getElementById("requestDeletion").addEventListener("click", async () => {
      const btn = document.getElementById("requestDeletion");
      btn.disabled = true;
      showMessage("Processing your request...", "");

      try {
        const result = await requestDeletionFn();
        showMessage(result.data?.message || "Account deletion has been scheduled successfully (30 days).", "success");
      } catch (error) {
        console.error(error);
        showMessage(error.message || "Failed to schedule deletion.", "error");
      } finally {
        btn.disabled = false;
      }
    });

    // ====================== SIGN OUT ======================
    document.getElementById("signOut").addEventListener("click", async () => {
      try {
        await signOut(auth);
        showMessage("Signed out successfully.", "success");
      } catch (err) {
        console.error(err);
        showMessage("Error signing out.", "error");
      }
    });
  </script>
</head>
<body>

  <h1>Request Account & Data Deletion</h1>
  <p>
    To request deletion of your account and all associated personal data, please sign in with the Google account you used in the app.<br>
    Once logged in, click the red button below — deletion will be scheduled in 30 days (irreversible after that).
  </p>

  <button id="googleSignIn">Sign in with Google</button>
  <div id="userInfo"></div>
  <button id="requestDeletion">Request Deletion Now</button>
  <button id="signOut">Sign Out</button>

  <div id="message"></div>

</body>
</html>
